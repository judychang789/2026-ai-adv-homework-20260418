name: Validate AI Section Index

on:
  pull_request:
    paths:
      - 'guides/**'
      - 'references/**'
      - 'scripts/validate-ai-index.sh'
      - 'scripts/validate-version-sync.sh'
      - 'scripts/validate-agents-parity.sh'
      - 'scripts/validate-internal-links.sh'
      - 'scripts/validate-guides-refs-consistency.sh'
      - 'test-vectors/**'
      - 'SKILL.md'
      - 'SKILL_OPENAI.md'
      - 'README.md'
      - 'SETUP.md'
      - 'AGENTS.md'
      - 'GEMINI.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/**'
  push:
    branches:
      - master
      - main
    paths:
      - 'guides/**'
      - 'references/**'
      - 'scripts/validate-ai-index.sh'
      - 'scripts/validate-version-sync.sh'
      - 'scripts/validate-agents-parity.sh'
      - 'scripts/validate-internal-links.sh'
      - 'scripts/validate-guides-refs-consistency.sh'
      - 'test-vectors/**'
      - 'SKILL.md'
      - 'SKILL_OPENAI.md'
      - 'README.md'
      - 'SETUP.md'
      - 'AGENTS.md'
      - 'GEMINI.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          echo "Checking all workflow YAML files for syntax errors..."
          python3 << 'PYEOF'
          import yaml, glob, sys
          failed = False
          for f in sorted(glob.glob('.github/workflows/*.yml')):
              try:
                  with open(f, encoding='utf-8') as fh:
                      yaml.safe_load(fh)
                  print(f'  OK: {f}')
              except yaml.YAMLError as e:
                  print(f'FAIL: {f}: {e}')
                  failed = True
          if failed:
              print('::error::One or more workflow YAML files have syntax errors')
              sys.exit(1)
          PYEOF

      - name: Validate AI Section Index line numbers
        run: bash scripts/validate-ai-index.sh
      - name: Validate version sync across all 9 files
        run: bash scripts/validate-version-sync.sh
      - name: Validate AGENTS.md ↔ GEMINI.md invariant sections
        run: bash scripts/validate-agents-parity.sh
      - name: Validate internal cross-guide links
        run: bash scripts/validate-internal-links.sh
      - name: Validate guides ↔ references ↔ scripts consistency
        run: bash scripts/validate-guides-refs-consistency.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pycryptodome
        run: pip install "pycryptodome>=3.20,<4"
      - name: Verify test vectors (Python - primary)
        run: python test-vectors/verify.py
      - name: Verify test vectors (Node.js - cross-language check for JS trap family)
        run: node test-vectors/verify-node.js
